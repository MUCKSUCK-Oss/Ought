<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <main id="home-view" class="view active">
    <header class="header">
      <div class="brand">
        <span class="logo">🚀</span>
        <h1>Ought</h1>
      </div>

      <button id="theme-btn" class="icon-btn" title="Toggle theme">
        🌙
      </button>
    </header>

    <button id="add-btn" class="primary-btn">
      ＋ New Workspace
    </button>

    <div id="workspace-list" class="workspace-list"></div>

    <footer class="footer">
      <div class="footer-divider"></div>
      <p>Ought helps you build better habits.</p>
    </footer>
  </main>

  <main id="edit-view" class="view">
    <header class="header">
      <button id="back-btn" class="icon-btn">←</button>
      <h2>Workspace Settings</h2>
    </header>

    <div class="form-group">
      <label for="ws-name">Workspace Name</label>
      <input
        id="ws-name"
        type="text"
        placeholder="e.g. Code, Study, Design"
      />
    </div>

    <div class="form-group">
      <label>Website Links</label>

      <button id="capture-tabs-btn" class="secondary-btn">
        📥 Capture Current Tabs
      </button>

      <div id="url-container" class="url-container"></div>

      <button id="add-url-btn" class="secondary-btn dashed-btn">
        ＋ Add another link
      </button>
    </div>

    <label class="checkbox-container">
      <input id="ws-entertainment" type="checkbox" />
      <span class="checkmark"></span>
      Mark as entertainment (adds a 10-second delay)
    </label>

    <div class="actions">
      <button id="save-ws-btn" class="primary-btn">
        Save Workspace
      </button>

      <button id="delete-ws-btn" class="danger-btn">
        Delete Workspace
      </button>
    </div>
  </main>

  <main id="friction-view" class="view">
    <div class="friction-container">
      <div class="hourglass">⏳</div>

      <h2>Hold on.</h2>

      <p id="quote-text" class="quote">
        "Say 'no' to distraction so you can say 'yes' to your destiny."
      </p>

      <p id="timer-text">Launching in 10 seconds</p>

      <button id="cancel-friction-btn" class="danger-btn">
        Actually, I'll work
      </button>
    </div>
  </main>

  <script src="popup.js"></script>
</body>
</html>
